<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>
      {% block title %}
        Todo App
      {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">TodoApp</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'task_forms' %}">Create</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href=" {% url 'tasklist' %} ">Task List</a>
            </li>

            {% if user.is_authenticated %}
              <form action="{% url 'logout' %}" method="POST">
                {% csrf_token %}
                <button type="submit">Logout</button>
              </form>
            {% else %}
              <li class="nav-item">
                <a class="nav-link text-success" href="{% url 'login' %}">Login</a>
              </li>

              <li class="nav-item">
                <a class="nav-link text-warning" href="{% url 'register' %}">Register</a>
              </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>
    <div class="container mt-5">
      {% block content %}

      {% endblock %}
    </div>
    <footer class="bg-dark text-white mt-5 py-4">
      <div class="container text-center">
        <p class="mb-0">© 2026 Todo App | Built with Django</p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
